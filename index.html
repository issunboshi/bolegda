<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Balegdah</title>
    <meta name="description" content="An ode to Balegdah. Achieve perfect pronunciation in three simple steps.">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
    <main class="stage" aria-busy="true" data-state="loading">
        <header class="intro">
            <p class="eyebrow">An ode to</p>
            <h1 class="wordmark" aria-label="Balegdah">
                <span class="wordmark__ba">Ba</span><span class="wordmark__le">le</span><span class="wordmark__gdah">gdah</span>
            </h1>
            <p class="tagline">Achieve perfect pronunciation in three simple steps.</p>
        </header>

        <section class="controls" aria-label="Audio controls">
            <button class="pill" data-action="play-full" type="button">
                <span class="pill__label">Play the original</span>
                <span class="pill__hint">the one, the only</span>
            </button>

            <div class="tiles" role="group" aria-label="Syllables">
                <button class="tile tile--ba"   data-action="play-sprite" data-sprite="ba"   type="button" aria-label="Play Ba">Ba</button>
                <button class="tile tile--le"   data-action="play-sprite" data-sprite="le"   type="button" aria-label="Play Le">Le</button>
                <button class="tile tile--gdah" data-action="play-sprite" data-sprite="gdah" type="button" aria-label="Play Gdah">Gdah</button>
            </div>

            <div class="secondary">
                <button class="ghost" data-action="stop" type="button">Stop</button>
                <button class="ghost" data-action="loop" type="button" aria-pressed="false">Loop</button>
            </div>
        </section>

        <p class="status" role="status" aria-live="polite">Loading sound&hellip;</p>
    </main>

    <script type="module" src="/assets/app.js"></script>
</body>
</html>
